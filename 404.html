<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Sharla Mohney Salon</title>
  <link rel="canonical" href="https://sharlamohneysalon.com/" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #FAFAF8;
      --dark: #1A1A1A;
      --primary: #2C3244;
      --accent: #C9A96E;
      --accent-dark: #A8874D;
      --text: #2D2D2D;
      --text-muted: #777;
      --white: #FFFFFF;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'Inter', -apple-system, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      font-size: 16px;
      background: var(--dark);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    .nav {
      padding: 1rem 2rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .nav img { height: 40px; }
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 2rem;
    }
    .four-oh-four {
      font-family: var(--font-display);
      font-size: clamp(6rem, 20vw, 14rem);
      font-weight: 400;
      color: rgba(255,255,255,0.06);
      line-height: 1;
      margin-bottom: 1rem;
    }
    h1 {
      font-family: var(--font-display);
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 500;
      font-style: italic;
      margin-bottom: 1rem;
    }
    p {
      color: rgba(255,255,255,0.58);
      font-size: 1rem;
      line-height: 1.68;
      max-width: 400px;
      margin: 0 auto 2rem;
      font-weight: 300;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      padding: 0.85rem 2rem;
      background: var(--accent);
      color: var(--white);
      border-radius: 2px;
      font-weight: 500;
      font-size: 0.88rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--accent-dark); }
    .footer {
      padding: 1.5rem 2rem;
      border-top: 1px solid rgba(255,255,255,0.08);
      text-align: center;
    }
    .footer p { font-size: 0.8rem; color: rgba(255,255,255,0.3); }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="index.html" aria-label="Sharla Mohney Salon home">
      <img src="https://sharlamohneysalon.com/style/images/logo-light.png" alt="Sharla Mohney Salon" width="150" height="40" />
    </a>
  </nav>

  <main class="main">
    <div>
      <div class="four-oh-four">404</div>
      <h1>Page Not Found</h1>
      <p>That page doesn't exist. It may have moved or the URL may be incorrect.</p>
      <a href="index.html" class="btn">Back to Home</a>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; 2024 Sharla Mohney Salon. 820 W Eisenhower Pkwy, Suite 123, Ann Arbor, MI 48103</p>
  </footer>
</body>
</html>
